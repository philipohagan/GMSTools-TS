name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Clean install
      run: |
        rm -rf node_modules package-lock.json
        npm install

    - name: Run tests
      run: npm test

    - name: Run test coverage
      run: npm run test:coverage 